<style>
:root{
  --blue:#153a66; --blue2:#2360a5; --gold:#b68a45; --bg:#f4f7fb; --line:#d7e0ec;
  --text:#17233d; --muted:#66748a; --ok:#166534; --bad:#b91c1c; --warn:#8a5a00;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:"Chulabhorn Likit Text Light","TH Sarabun New",Sarabun,Arial,sans-serif;color:var(--text);font-size:16px;line-height:1.55}
.app{max-width:1180px;margin:auto;padding:18px}
.hero{background:linear-gradient(135deg,#143b6c,#235f9e);color:#fff;border-radius:18px;padding:22px 26px;margin-bottom:16px;display:flex;gap:18px;align-items:center;box-shadow:0 8px 22px rgba(20,59,108,.22)}
.hero img{width:56px;height:auto;display:block}
.hero h1{font-size:1.35rem;margin:0 0 5px;font-weight:800}.hero p{margin:0;color:#e4edf7;font-size:.95rem}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px}.toolbar button,.btn{border:0;border-radius:10px;padding:9px 14px;font-family:inherit;font-weight:700;cursor:pointer;background:#e8eef7;color:#21334f}.toolbar button:hover,.btn:hover{filter:brightness(.96)}
.btn.primary{background:var(--blue2);color:#fff}.btn.green{background:#166534;color:#fff}.btn.red{background:#fee2e2;color:#991b1b}.btn.ghost{background:#fff;border:1px solid var(--line)}
.grid{display:grid;grid-template-columns:280px 1fr;gap:14px}.side{position:sticky;top:12px;align-self:start;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.side a{display:block;text-decoration:none;color:#263a57;border-radius:9px;padding:9px 10px;font-size:.92rem}.side a:hover{background:#eef5ff;color:var(--blue2)}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card h2{margin:0 0 14px;color:var(--blue);font-size:1.13rem;border-bottom:2px solid #edf2f9;padding-bottom:9px}.card h3{font-size:1rem;color:var(--blue2);margin:16px 0 8px}
.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px}.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}.row4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px}.one{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.f{display:flex;flex-direction:column;gap:4px}.f label{font-size:.84rem;font-weight:800;color:#3c4e69}.hint{font-size:.76rem;color:var(--muted)}
input,select,textarea{width:100%;border:1.5px solid #cfd9e8;background:#fbfdff;color:var(--text);border-radius:9px;padding:9px 11px;font:inherit;font-size:.93rem;outline:none}textarea{min-height:86px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#2a69ae;box-shadow:0 0 0 3px rgba(42,105,174,.12)}
.checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.check{display:flex;align-items:flex-start;gap:8px;border:1px solid #dce5f1;border-radius:9px;padding:8px 10px;background:#fff}.check input{width:16px;height:16px;margin-top:4px;accent-color:var(--blue2)}
.table{width:100%;border-collapse:collapse;font-size:.86rem;margin:8px 0}.table th,.table td{border:1px solid #cfd9e8;padding:7px;vertical-align:top}.table th{background:#eaf1fb;color:#1b3f6a;text-align:center}.table input,.table textarea,.table select{border:0;background:transparent;padding:2px;border-radius:0}.table textarea{min-height:40px}.table .center{text-align:center}.table .special{background:#fff7d6;color:#7a5300;font-weight:700}.table .holiday{background:#fee2e2;color:#8a1f1f;font-weight:700}
.listItem{border:1px solid #e0e7f0;border-radius:12px;padding:12px;margin-bottom:9px;background:#fbfdff}.listHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.badge{display:inline-block;border-radius:999px;padding:3px 10px;background:#edf4ff;color:#1e4f88;font-weight:800;font-size:.78rem}.sum{display:inline-block;border-radius:8px;padding:7px 12px;font-weight:800}.sum.ok{background:#dcfce7;color:#166534}.sum.bad{background:#fee2e2;color:#991b1b}.sum.warn{background:#fff7d6;color:#7a5300}
.status{display:none;border-radius:12px;padding:12px 14px;margin:10px 0;font-weight:700}.status.show{display:block}.status.ok{background:#dcfce7;color:#14532d}.status.bad{background:#fee2e2;color:#7f1d1d}.status.info{background:#dbeafe;color:#1e3a5f}.status.warn{background:#fff7d6;color:#7a5300}
.upload{border:2px dashed #8bb7e8;border-radius:14px;background:#f1f7ff;padding:18px;text-align:center;cursor:pointer}.upload:hover{background:#e8f2ff}.small{font-size:.82rem;color:var(--muted)}
.locked{background:#f7f7f7;border:1px solid #e2e2e2;border-radius:12px;padding:12px}.yellowTitle{background:#ffff69;border-radius:4px;padding:8px 10px;text-align:center;font-weight:800;color:#111;margin:14px 0 10px}
.previewBox{max-height:420px;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:8px;background:#fff}
@media(max-width:900px){.grid{grid-template-columns:1fr}.side{position:static}.row,.row3,.row4{grid-template-columns:1fr}.checks{grid-template-columns:1fr}.hero{align-items:flex-start}}
@media print{body{background:#fff}.side,.toolbar,.btn{display:none}.card{box-shadow:none;break-inside:avoid}}
</style>
</head>

function loadState(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'null'); }catch(e){ return null; } }
function persist(){ localStorage.setItem(LS_KEY, JSON.stringify(data)); }
function val(v){ return (v===undefined || v===null || String(v).trim()==='') ? DOTS : String(v).trim(); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function esc(s){ return String(s??'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function pathGet(obj,path){ return path.split('.').reduce((a,k)=>a&&a[k], obj); }
function pathSet(obj,path,value){ const ks=path.split('.'); let cur=obj; ks.slice(0,-1).forEach(k=>{ if(cur[k]===undefined) cur[k]={}; cur=cur[k]; }); cur[ks.at(-1)] = value; }
function setStatus(msg, cls='info'){ const el=document.getElementById('status'); el.textContent=msg; el.className='status show '+cls; }
function clearStatus(){ const el=document.getElementById('status'); el.className='status'; el.textContent=''; }

function ymd(d){ if(!d) return ''; const dt = (d instanceof Date)?d:new Date(d+'T00:00:00'); if(isNaN(dt)) return ''; return dt.toISOString().slice(0,10); }
function addDays(dateStr, days){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+days); return ymd(d); }
function yearBEFromDate(dateStr){ const d=new Date(dateStr+'T00:00:00'); return isNaN(d)?'':String(d.getFullYear()+543); }
function thaiDate(dateStr, withDay=false){
  if(!dateStr) return DOTS;
  const d=new Date(dateStr+'T00:00:00'); if(isNaN(d)) return DOTS;
  const s = `${d.getDate()} ${TH_MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
  return withDay ? `${TH_DAYS[d.getDay()]}ที่ ${s}` : s;
}
function thaiDateLong(dateStr, start='', end=''){
  const time = (start||end) ? ` เวลา ${formatTime(start)} - ${formatTime(end)} น.` : '';
  return `${thaiDate(dateStr,true)}${time}`;
}
function formatTime(t){ if(!t) return DOTS; return String(t).replace(':','.'); }

function field(path,label,type='text',hint=''){
  const v=pathGet(data,path)??'';
  return `<div class="f"><label>${label}</label><input type="${type}" value="${esc(v)}" oninput="pathSet(data,'${path}',this.value);persist();updateDerived()">${hint?`<div class="hint">${hint}</div>`:''}</div>`;

function area(path,label,rows=3,hint=''){
  const v=pathGet(data,path)??'';
  return `<div class="f"><label>${label}</label><textarea rows="${rows}" oninput="pathSet(data,'${path}',this.value);persist();updateDerived()">${esc(v)}</textarea>${hint?`<div class="hint">${hint}</div>`:''}</div>`;

function selectField(path,label,opts){
  const v=pathGet(data,path)??'';
  return `<div class="f"><label>${label}</label><select onchange="pathSet(data,'${path}',this.value);persist();updateDerived()">${opts.map(o=>`<option value="${esc(o)}" ${o===v?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
}
function makeCard(id,title,html){ const e=document.createElement('section'); e.id=id; e.className='card'; e.innerHTML=`<h2>${title}</h2>${html}`; return e; }
function check(path,label){ const checked=!!pathGet(data,path); return `<label class="check"><input type="checkbox" ${checked?'checked':''} onchange="pathSet(data,'${path}',this.checked);persist();render()"><span>${label}</span></label>`; }
function optionChecks(group){
  const arr=data.selected[group]||[];
  return `<div class="checks">${CHECK_OPTIONS[group].map(o=>`<label class="check"><input type="checkbox" ${arr.includes(o)?'checked':''} onchange="toggleSelected('${group}', '${esc(o).replace(/'/g,"\\'")}', this.checked)"><span>${esc(o)}</span></label>`).join('')}</div>`;
}
function toggleSelected(group,item,checked){
  const arr=data.selected[group] || (data.selected[group]=[]);
  const i=arr.indexOf(item);
  if(checked && i<0) arr.push(item);
  if(!checked && i>=0) arr.splice(i,1);
  persist(); updateDerived();
}

function ensureTopics(kind){
  const p=data.schedule[kind];
  const n=Math.max(0, parseInt(p.sessions||0));
  if(!Array.isArray(p.topics)) p.topics=[];
  while(p.topics.length<n) p.topics.push({topic:'',activity:'',teacher:''});
  if(p.topics.length>n) p.topics=p.topics.slice(0,n);
}
function allHolidays(){ return [...(data.schedule.apiHolidays||[]), ...(data.schedule.customHolidays||[])].filter(h=>h.date); }
function holidayMap(){ const m={}; allHolidays().forEach(h=>{m[h.date]=h.name||'วันหยุด'}); return m; }
function buildRows(kind){
  const p=data.schedule[kind];
  if(!p.enabled || !p.startDate) return [];
  ensureTopics(kind);
  const hm = holidayMap();
  const events=[];
  const count=Math.max(0, parseInt(p.sessions||0));
  let date=p.startDate, n=1, safety=0;
  while(n<=count && safety<120){
    safety++;
    if(hm[date]){
      events.push({type:'holiday',date,text:hm[date]});
      date=addDays(date,7); continue;
    }
    if(date===data.schedule.midtermDate){
      events.push({type:'midterm',date,text:'สอบกลางภาค'});
      date=addDays(date,7); continue;
    }
    if(date===data.schedule.finalDate){
      events.push({type:'final',date,text:'สอบประจำภาค'});
      date=addDays(date,7); continue;
    }
    const t=p.topics[n-1]||{};
    events.push({type:'class',date,no:n,topic:t.topic||'',activity:t.activity||'',teacher:t.teacher||p.defaultTeacher||'',hours:p.hours||'',start:p.startTime,end:p.endTime});
    n++; date=addDays(date,7);
  }
  const maybeAddExam=(type,date,label)=>{ if(date && !events.some(e=>e.date===date && e.type===type)) events.push({type,date,text:label}); };
  maybeAddExam('midterm',data.schedule.midtermDate,'สอบกลางภาค');
  maybeAddExam('final',data.schedule.finalDate,'สอบประจำภาค');
  return events.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
}

async function loadThaiHolidays(){
  clearStatus();
  const be = parseInt(data.yearBE || (new Date().getFullYear()+543));
  const ce = be > 2400 ? be-543 : be;
  state.holidayMessage = 'กำลังโหลดวันหยุดจาก API'; updateDerived();
  try{
    const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${ce}/TH`, {cache:'no-store'});
    if(!res.ok) throw new Error('API ตอบกลับไม่สำเร็จ');
    const arr = await res.json();
    data.schedule.apiHolidays = arr.map(x=>({date:x.date, name:x.localName || x.name || 'วันหยุดราชการ'}));
    state.holidayMessage = `โหลดวันหยุดสำเร็จ ${data.schedule.apiHolidays.length} รายการ`;
    setStatus(state.holidayMessage,'ok'); persist(); updateDerived();
  }catch(e){
    data.schedule.apiHolidays = fallbackHolidays(ce);
    state.holidayMessage = `โหลด API ไม่สำเร็จ ใช้รายการพื้นฐาน ${data.schedule.apiHolidays.length} รายการ`;
    setStatus(state.holidayMessage,'warn'); persist(); updateDerived();
  }
}

async function waitDocx(){
  if(window.docx) return window.docx;
  if(window.__docxFailed) throw new Error('ไม่สามารถโหลด docx.js ได้ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วโหลดหน้าใหม่');
  return new Promise((resolve,reject)=>{
    const start=Date.now();
    (function check(){
      if(window.docx) return resolve(window.docx);
      if(window.__docxFailed) return reject(new Error('โหลด docx.js ไม่สำเร็จ'));
      if(Date.now()-start>20000) return reject(new Error('รอโหลด docx.js เกิน 20 วินาที'));
      setTimeout(check,250);
    })();
  });
}

function validateBeforeDownload(){

  if(Math.abs(scoreSum()-100)>0.001) msgs.push('ผลรวมสัดส่วนคะแนนรวมยังไม่เท่ากับ 100%');

}

  if(ask && !validateBeforeDownload()) return;
  const D = await waitDocx();
  const doc = type==='syllabus' ? buildSyllabus(D) : buildSpec(D);
  const blob = await D.Packer.toBlob(doc);
  const safeCode = (data.code||'Course').replace(/[^a-zA-Z0-9ก-๙_-]+/g,'_');
  const fname = type==='syllabus' ? `FM-SCE-002_${safeCode}_Course_Syllabus.docx` : `FM-SCE-003_${safeCode}_Course_Specification.docx`;

}
function docHelpers(D){
  const {Paragraph, TextRun, AlignmentType, Table, TableRow, TableCell, WidthType, BorderStyle, VerticalAlign, ImageRun, Header, Footer, PageBreak, ShadingType} = D;
  const totalW = 9360;
  const border = {style:BorderStyle.SINGLE,size:1,color:'9AA9BB'};
  const noBorder = {style:BorderStyle.NONE,size:0,color:'FFFFFF'};
  function tr(text,opt={}){ return new TextRun({text:String(text??''), font:FONT, size:opt.size||24, bold:!!opt.bold, italics:!!opt.italics, color:opt.color||'000000', underline:opt.underline?{}:undefined}); }
  function p(text='',opt={}){
    let children;
    if(Array.isArray(text)) children=text.map(x=> typeof x==='string'?tr(x,opt):tr(x.text||x.t||'',x)); else children=splitLines(text).length>1 ? splitLines(text).flatMap((line,idx)=>idx?[new TextRun({break:1}), tr(line,opt)]:[tr(line,opt)]) : [tr(text,opt)];
    return new Paragraph({children, alignment:opt.center?AlignmentType.CENTER:opt.right?AlignmentType.RIGHT:AlignmentType.LEFT, spacing:{before:opt.before||0,after:opt.after??80,line:opt.line||276}, indent:opt.indent?{left:opt.indent}:undefined});
  }
  function title(text,size=28){ return p(text,{center:true,bold:true,size,after:70}); }
  function sectionTitle(text){ return p(text,{bold:true,size:24,after:80,before:120}); }
  function yellowTitle(text){ return new Paragraph({children:[tr(text,{bold:true,size:24})], alignment:AlignmentType.CENTER, shading:{type:ShadingType.CLEAR,fill:'FFFF66'}, spacing:{before:120,after:120}}); }
  function cell(content,opt={}){
    const kids = Array.isArray(content) ? content : [p(content,opt)];
    return new TableCell({children:kids, width:{size:opt.w||1000,type:WidthType.DXA}, columnSpan:opt.span, verticalAlign:VerticalAlign.CENTER, shading:opt.fill?{type:ShadingType.CLEAR,fill:opt.fill}:undefined, margins:{top:80,bottom:80,left:80,right:80}, borders:{top:border,bottom:border,left:border,right:border}});
  }
  function hcell(text,opt={}){ return cell(text,{...opt,bold:true,center:true,fill:opt.fill||'EAF1FB'}); }
  function tbl(rows,width=totalW){ return new Table({rows,width:{size:width,type:WidthType.DXA}, borders:{top:border,bottom:border,left:border,right:border,insideHorizontal:border,insideVertical:border}}); }
  function plainTbl(rows,width=totalW){ return new Table({rows,width:{size:width,type:WidthType.DXA}, borders:{top:noBorder,bottom:noBorder,left:noBorder,right:noBorder,insideHorizontal:noBorder,insideVertical:noBorder}}); }
  function headerFooter(code){
    const footer = new Footer({children:[p(`${code} คณะวิทยาศาสตร์ ราชวิทยาลัยจุฬาภรณ์ | `,{right:true,size:18,color:'555555'})]});
    return {footer};
  }
  function logo(){ return new Paragraph({alignment:AlignmentType.CENTER, children:[new ImageRun({data:logoBytes(), transformation:{width:73,height:151}})], spacing:{after:120}}); }
  function docBase(children,code){
    return new D.Document({
      creator:'CRA Course Form Generator',
      styles:{default:{document:{run:{font:FONT,size:24},paragraph:{spacing:{line:276}}}}},
      sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:1134,right:1134,bottom:1134,left:1134}}}, footers:{default:headerFooter(code).footer}, children}]
    });
  }
  return {Paragraph,TextRun,Table,TableRow,TableCell,PageBreak,totalW,tr,p,title,sectionTitle,yellowTitle,cell,hcell,tbl,plainTbl,logo,docBase};
}

async function importDocx(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file) return;
  if(!window.mammoth){ setStatus('ไม่สามารถโหลด mammoth.js สำหรับอ่านไฟล์ .docx ได้','bad'); return; }
  try{
    const ab=await file.arrayBuffer();
    const result=await mammoth.extractRawText({arrayBuffer:ab});
    const text=(result.value||'').replace(/\u0000/g,'').replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n');
    document.getElementById('rawTextBox').value=text;
    parseImportedText(text);
    setStatus('นำเข้าข้อมูลจากไฟล์ .docx แล้ว กรุณาตรวจทานทุกส่วน โดยเฉพาะตารางสอนและ CLO','ok');
    render();
    const box=document.getElementById('rawTextBox'); if(box) box.value=text;
  }catch(e){ setStatus('อ่านไฟล์ .docx ไม่สำเร็จ: '+e.message,'bad'); }
  ev.target.value='';
}
function parseImportedText(text){
  const t=text.replace(/\r/g,'').replace(/[ \t]+/g,' ');
  function m(re){ const x=t.match(re); return x?x[1].trim():''; }
  const codeName=m(/(?:รหัสวิชา|รายวิชา)\s*(?:\(|\.\.*)?\s*([A-Zก-๙0-9\- ]{3,30})\s+(?:ชื่อวิชา)?\s*([^\n]{3,120})/i);
  if(codeName){
    const mm=codeName.match(/^(.{3,20}?)\s+(.+)$/); if(mm){ data.code=mm[1].trim(); data.nameTH=mm[2].trim(); }
  }
  const sem=m(/ภาคการศึกษาที่\s*([^\s\n]+).*?(?:ปีการศึกษา|ประจำปีการศึกษา)\s*([0-9]{4})/s);
  if(sem){ const parts=sem.match(/^(.+?)\s+([0-9]{4})$/); if(parts){data.semester=parts[1].trim(); data.yearBE=parts[2];} }
  const y=m(/(?:ปีการศึกษา|ประจำปีการศึกษา)\s*([0-9]{4})/); if(y) data.yearBE=y;
  const cr=t.match(/หน่วยกิต\s*\(\s*([0-9.]+)\s*-\s*([0-9.]+)\s*-\s*([0-9.]+)\s*\)/); if(cr){data.creditLecture=cr[1];data.creditLab=cr[2];data.creditSelf=cr[3];}
  const hrs=t.match(/บรรยาย\s*([0-9.]+).*?ปฏิบัติการ\s*([0-9.]+).*?ศึกษาค้นคว้าด้วยตนเอง\s*([0-9.]+)/s); if(hrs){data.hourLecture=hrs[1];data.hourLab=hrs[2];data.hourSelf=hrs[3];}
  const pre=m(/(?:Pre-requisite|วิชาบังคับก่อน)[^\n]*\n?([\s\S]{0,240}?)(?:รายวิชาที่ต้องเรียนพร้อมกัน|Co-requisite|สถานที่เรียน|\n\d+\.)/); if(pre) data.preReq=pre.replace(/\n/g,' ').trim();
  const co=m(/(?:Co-requisite|วิชาที่ต้องเรียนพร้อมกัน)[^\n]*\n?([\s\S]{0,240}?)(?:สถานที่เรียน|วันที่จัดทำ|\n\d+\.)/); if(co) data.coReq=co.replace(/\n/g,' ').trim();
  const loc=m(/สถานที่เรียน\s*\n?([\s\S]{0,160}?)(?:วันที่จัดทำ|หมวดที่ 2|\n\d+\.)/); if(loc) data.location=loc.replace(/\n/g,' ').trim();
  const descTH=m(/คำอธิบายรายวิชา\s*(?:ภาษาไทย)?\s*([\s\S]{0,1500}?)(?:ภาษาอังกฤษ|จำนวนชั่วโมง|วัตถุประสงค์ของรายวิชา|CLOs|หมวดที่ 4)/); if(descTH) data.descriptionTH=cleanImport(descTH);
  const descEN=m(/ภาษาอังกฤษ\s*([\s\S]{0,1200}?)(?:จำนวนชั่วโมง|หมวดที่ 4|หมวดที่ 5)/); if(descEN) data.descriptionEN=cleanImport(descEN);
  const cloMatches=[...t.matchAll(/CLO\s*([0-9xX]+)?\s*([\s\S]{0,260}?)(?=CLO\s*[0-9xX]+|PLO\s*[1-5]|หมวดที่|\n\d+\.)/g)].map(x=>cleanImport(x[2])).filter(x=>x.length>8);
  if(cloMatches.length){ data.clos=cloMatches.slice(0,8).map((x,i)=>{ const c=blankClo(i+1); c.text=x; return c; }); }
  const aim=m(/จุดมุ่งหมายของรายวิชา\s*([\s\S]{0,500}?)(?:วัตถุประสงค์ในการพัฒนา|Course Objectives|3\.)/); if(aim) data.courseAim=cleanImport(aim);
  const form=m(/การประเมินเพื่อพัฒนาการเรียนรู้[^(\n]*\)?\s*([\s\S]{0,500}?)(?:2\)|การประเมินเพื่อตัดสินผล)/); if(form) data.formative=cleanImport(form);
  const summ=m(/การประเมินเพื่อตัดสินผลการเรียนรู้[^(\n]*\)?\s*([\s\S]{0,500}?)(?:ผลลัพธ์การเรียนรู้ของรายวิชา|3\. การตัดสินผล)/); if(summ) data.summative=cleanImport(summ);
  const main=m(/ตำราและเอกสารหลัก\s*([\s\S]{0,900}?)(?:เอกสารและข้อมูลสำคัญ|ตำราประกอบ|3\. เอกสาร)/); if(main) data.resourcesMain=splitImportedList(main,5);
  const imp=m(/เอกสารและข้อมูลสำคัญ\s*([\s\S]{0,900}?)(?:เอกสารและข้อมูลแนะนำ|หมวดที่ 7)/); if(imp) data.resourcesImportant=splitImportedList(imp,5);
  const rec=m(/เอกสารและข้อมูลแนะนำ\s*([\s\S]{0,900}?)(?:หมวดที่ 7|กลยุทธ์การประเมิน)/); if(rec) data.resourcesRecommended=splitImportedList(rec,5);
  data.schedule.lecture.startDate=''; data.schedule.lab.startDate='';
  data.schedule.apiHolidays=[]; data.schedule.customHolidays=[];
}
function cleanImport(s){ return String(s||'').replace(/\.{5,}/g,'').replace(/[•¨□☐☑]/g,'').replace(/\n+/g,' ').replace(/\s{2,}/g,' ').trim(); }
function splitImportedList(s,n){
  const parts=String(s||'').split(/(?:^|\n)\s*(?:[0-9]+[).]|-|•)\s*/).map(cleanImport).filter(x=>x && x.length>3);
  const out=parts.slice(0,n); while(out.length<n) out.push(''); return out;
}
function copyRawText(){ const b=document.getElementById('rawTextBox'); if(!b||!b.value){setStatus('ยังไม่มีข้อความที่อ่านจากไฟล์ .docx','warn');return;} navigator.clipboard.writeText(b.value); setStatus('คัดลอกข้อความแล้ว','ok'); }
function saveJson(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const safe=(data.code||'course_form').replace(/[^a-zA-Z0-9ก-๙_-]+/g,'_');
  saveAs(blob, `${safe}_course_form_data.json`);
}
async function loadJsonFile(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file) return;
  try{ data=JSON.parse(await file.text()); persist(); render(); setStatus('นำเข้า JSON สำเร็จ','ok'); }catch(e){ setStatus('นำเข้า JSON ไม่สำเร็จ: '+e.message,'bad'); }
  ev.target.value='';
}
function resetAll(){ if(confirm('ต้องการล้างข้อมูลทั้งหมดและเริ่มใหม่หรือไม่')){ data=defaultData(); localStorage.removeItem(LS_KEY); render(); setStatus('เริ่มข้อมูลใหม่แล้ว','ok'); } }

render();
</script>
