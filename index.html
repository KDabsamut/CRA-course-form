<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ระบบสร้าง Course Syllabus และ Course Specification คณะวิทยาศาสตร์ ราชวิทยาลัยจุฬาภรณ์ v6.0-template</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"
  onerror="console.warn('mammoth not loaded')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.66.4/docxtemplater.min.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Chulabhorn Likit Text Light","TH Sarabun New",Sarabun,Arial,sans-serif;background:#f0f4f8;color:#1a2740;font-size:16px;line-height:1.55}
.app{max-width:960px;margin:0 auto;padding:16px}
.hdr{background:linear-gradient(135deg,#1a3a6b,#2563a8);color:#fff;border-radius:14px;padding:20px 28px;margin-bottom:16px;display:flex;align-items:center;gap:18px}
.hdr img{height:64px;object-fit:contain}
.hdr-t h1{font-size:1.25rem;font-weight:700;margin-bottom:3px}
.hdr-t p{font-size:.85rem;opacity:.82}
.prog-wrap{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.steps-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.sdot{flex:1;min-width:28px;height:5px;border-radius:3px;background:#dde3ef;cursor:pointer;transition:.2s}
.sdot.done{background:#27ae60}.sdot.active{background:#2563a8}
.prog-lbl{font-size:.82rem;color:#5a6b8a}
.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 5px rgba(0,0,0,.09);margin-bottom:14px}
.card h2{font-size:1.1rem;font-weight:700;color:#1a3a6b;border-bottom:2px solid #e8eef6;padding-bottom:8px;margin-bottom:16px}
.card h3{font-size:.96rem;font-weight:700;color:#2563a8;margin:14px 0 7px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.gr1{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.fgrp{display:flex;flex-direction:column;gap:4px}
label{font-size:.84rem;font-weight:600;color:#3a4d6b}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid #d0d8e8;border-radius:8px;font-family:inherit;font-size:.92rem;color:#1a2740;background:#fafcff;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:#2563a8;box-shadow:0 0 0 3px rgba(37,99,168,.1)}
textarea{resize:vertical;min-height:70px}
.hint{font-size:.75rem;color:#7a8ea8;margin-top:2px}
.ckgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.cki{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;border:1.5px solid #e0e8f4;border-radius:8px;cursor:pointer;transition:.15s;font-size:.84rem}
.cki:hover{background:#f0f5ff;border-color:#aac4e8}
.cki input{width:15px;height:15px;flex-shrink:0;margin-top:2px;accent-color:#2563a8;cursor:pointer}
.rad-grp{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.rad-item{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1.5px solid #d0d8e8;border-radius:8px;cursor:pointer;font-size:.86rem;transition:.15s}
.rad-item:hover{background:#f0f5ff;border-color:#aac4e8}
.rad-item input{accent-color:#2563a8;width:14px;height:14px;cursor:pointer}
.dyn-row{border:1.5px solid #e0e8f4;border-radius:10px;padding:12px;background:#fafcff;margin-bottom:8px}
.dyn-lbl{font-size:.8rem;font-weight:700;color:#2563a8;margin-bottom:8px}
.btn-add{width:100%;padding:8px;background:#eef4ff;border:1.5px dashed #7aadee;border-radius:8px;color:#2563a8;cursor:pointer;font-family:inherit;font-size:.86rem;font-weight:600;transition:.15s;margin-top:4px}
.btn-add:hover{background:#d8eaff}
.btn-rm{padding:5px 12px;background:#fee2e2;border:none;border-radius:6px;color:#b91c1c;cursor:pointer;font-family:inherit;font-size:.82rem;transition:.15s}
.btn-rm:hover{background:#fecaca}
.mtbl{width:100%;border-collapse:collapse;font-size:.79rem}
.mtbl th,.mtbl td{border:1px solid #cdd7e8;padding:6px 7px;vertical-align:middle}
.mtbl th{background:#e8eef8;font-weight:700;color:#1a3a6b;text-align:center}
.mtbl td.lbl{text-align:left;font-size:.77rem;color:#2a3a5a;line-height:1.3}
.mtbl td{text-align:center}
.mtbl input[type=checkbox]{accent-color:#2563a8;cursor:pointer;width:15px;height:15px}
.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th,.stbl td{border:1px solid #cdd7e8;padding:6px 9px;vertical-align:top}
.stbl th{background:#e8eef8;font-weight:700;color:#1a3a6b;text-align:center}
.stbl td.exam{background:#fff3cd;font-weight:700;color:#7d5a00;text-align:center;font-size:.8rem}
.stbl td.hol{background:#fee2e2;color:#922;text-align:center;font-size:.77rem}
.stbl input{border:none;background:transparent;width:100%;font-family:inherit;font-size:.82rem;padding:0;outline:none}
.nav-bar{display:flex;justify-content:space-between;gap:10px;margin-top:8px}
.btn{padding:10px 24px;border:none;border-radius:9px;font-family:inherit;font-size:.94rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-bk{background:#e8eef6;color:#3a4d6b}.btn-bk:hover{background:#d4deed}
.btn-nx{background:#2563a8;color:#fff}.btn-nx:hover{background:#1a4d8a}
.gen-wrap{background:#fff;border-radius:14px;padding:32px;box-shadow:0 1px 5px rgba(0,0,0,.09)}
.gen-wrap h2{font-size:1.2rem;color:#1a3a6b;margin-bottom:6px}
.gen-wrap p{color:#5a6b8a;margin-bottom:22px;font-size:.9rem}
.gen-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.btn-dl{padding:14px 24px;border:none;border-radius:10px;font-family:inherit;font-size:.94rem;font-weight:700;cursor:pointer;transition:.2s;text-align:center}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.18)}
.btn-s{background:#1a3a6b;color:#fff}.btn-m{background:#166534;color:#fff}
.status{padding:12px 16px;border-radius:8px;font-size:.88rem;display:none;margin-top:8px}
.status.show{display:block}.status.ok{background:#dcfce7;color:#14532d}.status.err{background:#fee2e2;color:#7f1d1d}.status.info{background:#dbeafe;color:#1e3a5f}
.sum-badge{display:inline-block;padding:5px 14px;border-radius:6px;font-size:.86rem;font-weight:700;margin-top:6px}
.sum-ok{background:#dcfce7;color:#14532d}.sum-bad{background:#fee2e2;color:#7f1d1d}
.upload-zone{border:2px dashed #7aadee;border-radius:10px;padding:20px;text-align:center;background:#f0f7ff;cursor:pointer;transition:.2s;margin-bottom:14px}
.upload-zone:hover{background:#e0efff;border-color:#2563a8}
.upload-zone p{color:#2563a8;font-size:.9rem;font-weight:600}
.time-row{display:flex;gap:6px;align-items:center}
.time-row input{flex:1}
.time-sep{flex-shrink:0;color:#7a8ea8;font-size:.9rem}
@media(max-width:620px){.gr2,.gr3{grid-template-columns:1fr}.ckgrid{grid-template-columns:1fr}}


.version-badge{position:fixed;left:8px;bottom:6px;background:rgba(26,58,107,.86);color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;z-index:9999}
</style>
</head>

function arrayBufferToBase64(buffer){
  let binary = "";
  const bytes = new Uint8Array(buffer);
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}
function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

  return "วัน"+TH_DAYS[dt.getDay()]+"ที่ "+dt.getDate()+" "+TH_MONTHS[dt.getMonth()]+" พ.ศ. "+(dt.getFullYear()+543);
}
function thaiTime(ts, te){
  const fmt = t => t ? t.replace(":",".") : ".......";
  return fmt(ts)+" - "+fmt(te)+" น.";
}
function thaiYearFull(y){
  const n = parseInt(y)||0;
  return n > 2400 ? String(n) : String(n+543);
}
function parseLocalDate(v){
  if(!v) return null;
  if(v instanceof Date) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
  const m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(v);
  return isNaN(d) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function isoLocal(d){
  const dt = parseLocalDate(d);
  if(!dt) return "";
  const y=dt.getFullYear();
  const m=String(dt.getMonth()+1).padStart(2,"0");
  const day=String(dt.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function sameLocalDate(a,b){ return !!a && !!b && isoLocal(a)===isoLocal(b); }
function examTypeOnDate(dt){
  if(S.d.midtermDate && sameLocalDate(dt,S.d.midtermDate)) return "midterm";
  if(S.d.finalDate && sameLocalDate(dt,S.d.finalDate)) return "final";
  return null;
}
function isLectureType(){ return S.d.charType==="lecture" || S.d.charType==="both"; }
function isLabType(){ return S.d.charType==="lab" || S.d.charType==="both"; }

function ensureTopics(n){

  while(S.d.labTopics.length < n) S.d.labTopics.push({topic:"",activity:"",teacher:""});
}
function ensureCloAssess(){
  while(S.d.cloAssess.length < S.d.clos.length) S.d.cloAssess.push([{method:"",weight:""}]);
  while(S.d.cloMethods.length < S.d.clos.length) S.d.cloMethods.push({teaching:"",measure:""});
}

function cloWeightTotal(){

async function fetchHols(year){
  if(S.holidays[year] !== undefined) return S.holidays[year];
  S.holidays[year] = new Set();
  try {
    const r = await fetch("https://date.nager.at/api/v3/PublicHolidays/"+year+"/TH",
      {mode:"cors",headers:{Accept:"application/json"}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    S.holidays[year] = new Set(data.map(h=>h.date));
  } catch(e){
    console.warn("Holiday fetch failed for "+year+":", e.message);
  }
  return S.holidays[year];
}

async function loadAllHolidays(){
  if(!S.d.semStart) return;
  const start = parseLocalDate(S.d.semStart);
  const yrs = new Set();
  for(let w=0; w<(parseInt(S.d.numWeeks)||15)+2; w++){
    const t = new Date(start); t.setDate(t.getDate()+w*7); yrs.add(t.getFullYear());
  }
  await Promise.all([...yrs].map(y=>fetchHols(y)));
}

function isHoliday(dateStr){
  const hols = S.holidays[(parseLocalDate(dateStr)||new Date()).getFullYear()] || new Set();
  const custom = new Set((S.d.customHolidays||[]).map(h=>h.date));
  return hols.has(dateStr) || custom.has(dateStr);
}

function getHolDesc(dateStr){
  const custom = (S.d.customHolidays||[]).find(h=>h.date===dateStr);
  if(custom) return custom.desc || "วันหยุดพิเศษ";
  return "วันหยุดราชการ";
}

async function calcSched(isLab){
  if(!S.d.semStart) return [];
  const dayOfWeek = parseInt(isLab ? S.d.labDay : S.d.lectureDay);
  const targetSessions = parseInt(S.d.numWeeks)||15;

  await loadAllHolidays();

  let cur = parseLocalDate(S.d.semStart);
  while(cur.getDay() !== dayOfWeek) cur.setDate(cur.getDate()+1);

  const rows = [];
  let sess = 0;
  let guard = 0;
  while(sess < targetSessions && guard < 80){
    guard++;
    const ds = isoLocal(cur);
    const ex = examTypeOnDate(cur);
    const hol = isHoliday(ds);

    if(ex){
      rows.push({type:ex, date:new Date(cur), dateStr:ds});
      cur.setDate(cur.getDate()+7);
      continue;
    }

    if(hol){
      rows.push({type:"holiday", date:new Date(cur), dateStr:ds, holDesc:getHolDesc(ds)});
      cur.setDate(cur.getDate()+7);
      continue;
    }

    sess++;
    rows.push({type:"lecture", date:new Date(cur), dateStr:ds, sess});
    cur.setDate(cur.getDate()+7);
  }

  // If exams did not fall on the selected class day, append them separately after the class list.
  if(S.d.midtermDate && !rows.some(r=>r.type==="midterm")) rows.push({type:"midterm", date:parseLocalDate(S.d.midtermDate), dateStr:isoLocal(S.d.midtermDate)});
  if(S.d.finalDate && !rows.some(r=>r.type==="final")) rows.push({type:"final", date:parseLocalDate(S.d.finalDate), dateStr:isoLocal(S.d.finalDate)});
  return rows;
}

async function handleUpload(file, statusEl){
  if(!file) return;
  if(!window.mammoth){ showSt(statusEl,"ไม่พบไลบรารี mammoth.js — กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต","err"); return; }
  showSt(statusEl,"กำลังอ่านไฟล์...","info");
  try {
    const arrBuf = await file.arrayBuffer();
    S.importedSpecB64 = arrayBufferToBase64(arrBuf);
    const result = await mammoth.extractRawText({arrayBuffer: arrBuf});
    const txt = result.value;
    parseDocxText(txt);
    showSt(statusEl,"ดึงข้อมูลสำเร็จ — กรุณาตรวจสอบและแก้ไขข้อมูลในขั้นตอนถัดไป (วันที่สอนต้องตั้งค่าใหม่ในขั้นตอนที่ 8)","ok");
  } catch(e){
    showSt(statusEl,"เกิดข้อผิดพลาดในการอ่านไฟล์: "+e.message,"err");
  }
}

function parseDocxText(raw){
  // Normalise line endings
  const t = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  function g(rx, flags){ const m=t.match(flags?new RegExp(rx,flags):new RegExp(rx)); return m?m[1].trim():""; }
  function set(key, val){ if(val && val!=="............." && val!==".............") S.d[key]=val; }

  // ── Course code & names ──
  // From "รายวิชา CODE  NAMETH" line
  const rvMatch = t.match(/รายวิชา\s+([A-Za-z0-9\s]+?)\s{2,}(.+?)(?:\n|ภาคการศึกษา)/);
  if(rvMatch){ set("code", rvMatch[1].trim()); set("nameTH", rvMatch[2].trim()); }
  // From "ภาษาไทย: CODE  NAMETH"
  const thLine = t.match(/ภาษาไทย:\s*(?:[A-Za-z0-9]+\s+)?(.+?)(?:\n|ภาษาอังกฤษ)/);
  if(thLine) set("nameTH", thLine[1].trim());
  // From "ภาษาอังกฤษ: CODE  NAMEEN"
  const enLine = t.match(/ภาษาอังกฤษ:\s*(?:[A-Za-z0-9]+\s+)?(.+?)(?:\n|จำนวนหน่วย)/);
  if(enLine) set("nameEN", enLine[1].trim());
  // Semester
  const semM = t.match(/ภาคการศึกษาที่\s+(\d)/);
  if(semM) set("semester", semM[1]);
  // Year (Thai BE 2xxx)
  const yrM = t.match(/ปีการศึกษา\s+(\d{4})/);
  if(yrM) set("year", yrM[1]);
  // Code alone (fallback)
  const codeM = t.match(/รหัสวิชา\s+([A-Za-z0-9]+)/);
  if(codeM && !S.d.code) set("code", codeM[1]);

  // ── Credits & hours ──
  const crM = t.match(/\((\d+)-(\d+)-(\d+)\)/);
  if(crM){ S.d.creditT=parseInt(crM[1])||0; S.d.creditP=parseInt(crM[2])||0; S.d.creditS=parseInt(crM[3])||0; }
  const hrM = t.match(/บรรยาย\s+(\d+)\s+ชม\.\s+ปฏิบัติการ\s+(\d+)\s+ชม\.\s+ค้นคว้าด้วยตนเอง\s+(\d+)\s+ชม/);
  if(hrM){ S.d.hrLecture=parseInt(hrM[1])||0; S.d.hrLab=parseInt(hrM[2])||0; S.d.hrSelf=parseInt(hrM[3])||0; }

  // ── Type ──
  const typeM = t.match(/ประเภท:\s*(.+?)\s+—\s+(.+?)(?:\n|$)/);
  if(typeM){
    const tg=typeM[1].trim();
    if(tg.includes("ศึกษาทั่วไป")) S.d.typeGroup="general";
    else if(tg.includes("เฉพาะ")) S.d.typeGroup="specific";
    else if(tg.includes("เลือกเสรี")) S.d.typeGroup="free";
    const sg=typeM[2].trim();
    if(sg.includes("บังคับ/พื้นฐาน")) S.d.typeSubGroup="required";
    else if(sg.includes("เอกบังคับ")) S.d.typeSubGroup="major";
    else S.d.typeSubGroup="elective";
  }
  // charType from ☑ marks
  if(t.includes("☑ บรรยาย+ปฏิบัติการ")||t.includes("☑บรรยาย+")) { S.d.charType="both"; S.d.hasLab=true; }
  else if(t.includes("☑ วิชาปฏิบัติการ")||t.includes("☑วิชาปฏิบัติ")) { S.d.charType="lab"; S.d.hasLab=true; }
  else { S.d.charType="lecture"; S.d.hasLab=false; }

  // ── Prereq / coreq ──
  const preM = t.match(/รายวิชาที่ต้องเรียนมาก่อน[^:]*:\s*(.+?)(?:\n|$)/);
  if(preM) set("prereq", preM[1].trim());
  const coM = t.match(/รายวิชาที่ต้องเรียนพร้อมกัน[^:]*:\s*(.+?)(?:\n|$)/);
  if(coM) set("coreq", coM[1].trim());

  // ── Dept / location ──
  const deptM = t.match(/หน่วยงานที่รับผิดชอบ\s*:\s*(.+?)(?:\n|$)/);
  if(deptM) set("dept", deptM[1].trim());
  const locM = t.match(/สถานที่เรียน:\s*(.+?)(?:\n|$)/);
  if(locM) set("location", locM[1].trim());

  // ── Student info ──
  const studM = t.match(/นักศึกษา:\s*ชั้นปีที่\s+(\d+)\s+จำนวน\s+(\d+)\s+คน/);
  if(studM){ set("studentYear", studM[1]); set("studentCount", studM[2]); }

  // ── Teachers – parse from table block ──
  // The instructor table linearises as: headers, "อาจารย์ผู้รับผิดชอบรายวิชา", rows, "อาจารย์ผู้สอน", rows
  const respBlock = t.match(/อาจารย์ผู้รับผิดชอบรายวิชา\n([\s\S]*?)(?=อาจารย์ผู้สอน)/);
  if(respBlock){
    const lines = respBlock[1].trim().split('\n').filter(x=>x.trim());
    // lines could be: "1. ชื่อ", "phone", "email", "สังกัด"  OR all in one line
    const combined = lines.join(' ');
    // Try "1. NAME" pattern
    const nameM = combined.match(/1\.\s*(.+?)(?:\s{2,}|\t)/);
    if(nameM) set("respName", nameM[1].trim());
    // Phone (Thai format)
    const phoneM = combined.match(/0[0-9\-]{8,}/);
    if(phoneM) set("respPhone", phoneM[0]);
    // Email
    const emailM = combined.match(/[\w._%+\-]+@[\w.\-]+\.[a-zA-Z]{2,}/);
    if(emailM) set("respEmail", emailM[0]);
    // Dept (after email or last segment)
    const deptLineM = combined.match(/[a-zA-Z0-9.]+@[^\s]+\s+(.+?)(?:\s*$)/);
    if(deptLineM) set("respDept", deptLineM[1].trim());
  }
  const teachBlock = t.match(/อาจารย์ผู้สอน\n([\s\S]*?)(?=\n•|\nหมวด|\nFM-SCE|$)/);
  if(teachBlock){
    const teachLines = teachBlock[1].trim().split('\n').filter(x=>x.trim());
    const teachers = [];
    let cur = null;
    teachLines.forEach(line=>{
      if(/^\d+\./.test(line.trim())){
        if(cur) teachers.push(cur);
        cur = {name:line.replace(/^\d+\.\s*/,"").trim(),dept:"",email:"",phone:""};
      } else if(cur) {
        if(!cur.phone && /0[0-9\-]{8,}/.test(line)) cur.phone=line.trim();
        else if(!cur.email && /@/.test(line)) cur.email=line.trim();
        else if(!cur.dept && line.trim().length>2) cur.dept=line.trim();
      }
    });
    if(cur) teachers.push(cur);
    if(teachers.length>0) S.d.teachers = teachers;
  }

  // ── CLOs ──
  const cloSection = t.match(/เมื่อสิ้นสุดการเรียนการสอน นักศึกษาสามารถ\n([\s\S]*?)(?=ตารางแสดง|$)/);
  if(cloSection){
    const cloMatches=[...cloSection[1].matchAll(/(\d+)\.\s*([\s\S]+?)(?=\n\d+\.\s|\n*ตาราง|$)/g)];
    if(cloMatches.length>0){
      S.d.clos=cloMatches.map(m=>({text:m[2].trim().replace(/\n/g," ")}));
      ensureCloAssess();
    }
  }

  // ── Aim / devObj ──
  const aimM = t.match(/จุดมุ่งหมายของรายวิชา:\s*([\s\S]+?)(?=\n•|วัตถุประสงค์การพัฒนา)/);
  if(aimM) set("aim", aimM[1].trim());
  const devM = t.match(/วัตถุประสงค์การพัฒนา\/ปรับปรุง:\s*([\s\S]+?)(?=\n•|\nวัตถุประสงค์ของ)/);
  if(devM) set("devObj", devM[1].trim());

  // ── Descriptions (from section 3) ──
  const sec3 = t.match(/หมวดที่ 3([\s\S]*?)(?=หมวดที่ 4)/);
  if(sec3){
    const s3 = sec3[1];
    const dthM = s3.match(/ภาษาไทย:\s*([\s\S]+?)(?=\s*ภาษาอังกฤษ)/);
    if(dthM) set("descTH", dthM[1].trim());
    const denM = s3.match(/ภาษาอังกฤษ:\s*([\s\S]+?)(?=\s*จำนวนชั่วโมง|\n•)/);
    if(denM) set("descEN", denM[1].trim());
  }

  // ── CLO teaching methods (section 4) ──
  const sec4 = t.match(/หมวดที่ 4([\s\S]*?)(?=หมวดที่ 5)/);
  if(sec4){
    // Table rows: "CLO N: text\nteaching method\nassessment method"
    const methodRows = [...sec4[1].matchAll(/CLO\s*(\d+):\s*[\s\S]+?\n([^\nCLO]+)\n([^\nCLO]+)/g)];
    methodRows.forEach(m=>{
      const ci = parseInt(m[1])-1;
      if(!S.d.cloMethods[ci]) S.d.cloMethods[ci]={teaching:"",measure:""};
      S.d.cloMethods[ci].teaching = m[2].trim();
      S.d.cloMethods[ci].measure = m[3].trim();
    });
  }

  // ── Books ──
  const sec6 = t.match(/หมวดที่ 6([\s\S]*?)(?=หมวดที่ 7)/);
  if(sec6){
    const s6 = sec6[1];
    const mainM = s6.match(/ตำราและเอกสารหลัก\n([\s\S]*?)(?=เอกสารและข้อมูลสำคัญ)/);
    if(mainM){ const bks=mainM[1].match(/\d+\)\s*(.+?)(?=\n\d+\)|\n•|$)/gs); if(bks) S.d.mainBooks=bks.map(b=>b.replace(/^\d+\)\s*/,"").trim()); }
    const suppM = s6.match(/เอกสารและข้อมูลสำคัญ\n([\s\S]*?)(?=เอกสารและข้อมูลแนะนำ)/);
    if(suppM){ const bks=suppM[1].match(/\d+\)\s*(.+?)(?=\n\d+\)|\n•|$)/gs); if(bks) S.d.suppBooks=bks.map(b=>b.replace(/^\d+\)\s*/,"").trim()); }
    const recM = s6.match(/เอกสารและข้อมูลแนะนำ\n([\s\S]*?)(?=\n•|FM-SCE|$)/);
    if(recM){ const bks=recM[1].match(/\d+\)\s*(.+?)(?=\n\d+\)|\n•|$)/gs); if(bks) S.d.recBooks=bks.map(b=>b.replace(/^\d+\)\s*/,"").trim()); }
  }

  // ── Eval section ──
  const sec7 = t.match(/หมวดที่ 7([\s\S]*?)(?=FM-SCE|$)/);
  if(sec7){
    const s7 = sec7[1];
    const evalM = s7.match(/กลยุทธ์การประเมินประสิทธิผลโดยนักศึกษา:\s*(.+?)(?=\n•|กลยุทธ์การประเมินการสอน)/s);
    if(evalM) set("evalStrat", evalM[1].trim());
    const teachEvalM = s7.match(/กลยุทธ์การประเมินการสอน:\s*(.+?)(?=\n•|การปรับปรุง)/s);
    if(teachEvalM) set("teachEval", teachEvalM[1].trim());
    const impM = s7.match(/การปรับปรุงการสอน:\s*(.+?)(?=\n•|การดำเนินการ)/s);
    if(impM) set("improve", impM[1].trim());
    const rvM = s7.match(/การดำเนินการทบทวนและวางแผนปรับปรุง:\s*(.+?)(?=\n|FM-SCE|$)/s);
    if(rvM) set("reviewPlan", rvM[1].trim());
  }

  // ── Score items from "- LABEL  WEIGHT%" lines ──
  const scoreLines = [...t.matchAll(/[-•]\s+(.+?)\s+(\d+)%/g)];
  if(scoreLines.length>0){
    const scored = scoreLines.map(m=>({label:m[1].trim(),weight:parseInt(m[2])||0}));
    if(scored.reduce((a,x)=>a+x.weight,0)>0) S.d.scoreItems=scored;
  }

  // ── Syllabus: check/boxes for teaching style ──
  const ckItems=["การทำรายงาน","การทำวิจัย/การทำโครงงาน","การทำงานเป็นกลุ่ม","การอภิปราย/การสัมมนา","การฝึกปฏิบัติ/การฝึกประสบการณ์","การให้นักศึกษานำเสนอผลงาน","Problem-Based Learning","Research-Based Learning","Project-Based Learning","Co-operative Learning","Case-Based Learning","คอมพิวเตอร์ร่วมกับโปรเจ็กเตอร์","ปัญญาประดิษฐ์ (AI)","โซเชียลมีเดีย"];
  const ckSC=[],ckLS=[],ckMedia=[];
  ckItems.forEach(item=>{
    const idx=t.indexOf("☑ "+item);
    if(idx<0) return;
    if(["การทำรายงาน","การทำวิจัย/การทำโครงงาน","การทำงานเป็นกลุ่ม","การอภิปราย/การสัมมนา","การฝึกปฏิบัติ/การฝึกประสบการณ์","การให้นักศึกษานำเสนอผลงาน"].includes(item)) ckSC.push(item);
    else if(["Problem-Based Learning","Research-Based Learning","Project-Based Learning","Co-operative Learning","Case-Based Learning"].includes(item)) ckLS.push(item);
    else ckMedia.push(item);
  });
  if(ckSC.length) S.d.ckSC=ckSC;
  if(ckLS.length) S.d.ckLS=ckLS;
  if(ckMedia.length) S.d.ckMedia=ckMedia;

  parseCourseSpecRaw(t);
}

function splitCodeName(line){
  const x=(line||"").trim().replace(/\s+/g," ");
  const m=x.match(/^(.+?\s+\d{4})\s+(.+)$/);
  if(m) return [m[1].trim(),m[2].trim()];
  return ["",x];
}
function inferCourseType(){
  const lec=Number(S.d.hrLecture||S.d.creditT||0);
  const lab=Number(S.d.hrLab||S.d.creditP||0);
  if(lec>0 && lab>0) S.d.charType="both";
  else if(lab>0 && lec===0) S.d.charType="lab";
  else S.d.charType="lecture";
  S.d.hasLab=(S.d.charType==="lab"||S.d.charType==="both");
}
function parseCourseSpecRaw(t){
  const clean=t.replace(/\r/g,"").replace(/[\t ]+/g," ");
  function set2(k,v){ v=(v||"").trim(); if(v && v!=="-" && v!==".............") S.d[k]=v; else if(v==="-") S.d[k]="-"; }

  let m=clean.match(/รายวิชา\s+([^\n]+?)\n\s*ภาคการศึกษาที่/);
  if(m){ const [code,name]=splitCodeName(m[1]); if(code) set2("code",code); if(name) set2("nameTH",name); }
  m=clean.match(/ภาษาไทย\s+([^\n]+)/);
  if(m){ const [code,name]=splitCodeName(m[1]); if(code) set2("code",code); if(name) set2("nameTH",name); }
  m=clean.match(/ภาษาอังกฤษ\s+([^\n]+)/);
  if(m){ const [code,name]=splitCodeName(m[1]); if(name) set2("nameEN",name); }
  m=clean.match(/ภาคการศึกษาที่\s*(\d+)\s*ประจำปีการศึกษา\s*(\d{4})/);
  if(m){ set2("semester",m[1]); set2("year",m[2]); }

  m=clean.match(/หน่วยกิต\s*(\d+)\s*\((\d+)\s*-\s*(\d+)\s*-\s*(\d+)\)/);
  if(m){ S.d.creditT=+m[2]; S.d.creditP=+m[3]; S.d.creditS=+m[4]; }
  m=clean.match(/บรรยาย\s*(\d+)\s*ชั่วโมง\s*ปฏิบัติการ\s*(\d+)\s*ชั่วโมง\s*ศึกษาค้นคว้าด้วยตนเอง\s*(\d+)\s*ชั่วโมง/);
  if(m){ S.d.hrLecture=+m[1]; S.d.hrLab=+m[2]; S.d.hrSelf=+m[3]; }
  inferCourseType();

  if(/วิชาเฉพาะ/.test(clean)) S.d.typeGroup="specific";
  if(/วิชาศึกษาทั่วไป/.test(clean)) S.d.typeGroup="general";
  if(/วิชาเลือกเสรี/.test(clean)) S.d.typeGroup="free";
  if(/วิชาเฉพาะเลือก/.test(clean)) S.d.typeSubGroup="elective";
  else if(/วิชาเอกบังคับ/.test(clean)) S.d.typeSubGroup="major";
  else if(/วิชาบังคับ|วิชาพื้นฐาน/.test(clean)) S.d.typeSubGroup="required";

  m=clean.match(/ชั้นปีที่\s*(\d+)\s*จำนวน\s*(\d+)\s*คน/);
  if(m){ set2("studentYear",m[1]); set2("studentCount",m[2]); }
  m=clean.match(/รายวิชาที่ต้องเรียนมาก่อน[\s\S]*?\n\s*([^\n]+)\n\s*รายวิชาที่ต้องเรียนพร้อมกัน/); if(m) set2("prereq",m[1]);
  m=clean.match(/รายวิชาที่ต้องเรียนพร้อมกัน[\s\S]*?\n\s*([^\n]+)\n\s*สถานที่เรียน/); if(m) set2("coreq",m[1]);
  m=clean.match(/สถานที่เรียน\s*\n\s*([^\n]+)\n/); if(m) set2("location",m[1]);
  m=clean.match(/วันที่จัดทำหรือปรับปรุงรายละเอียดของรายวิชาครั้งล่าสุด\s*\n\s*([^\n]+)/); if(m) set2("docDateText",m[1]);

  const resp=clean.match(/อาจารย์ผู้รับผิดชอบรายวิชา\s*\n\s*1\.\s*([^\n]+)\n\s*([^\n]+)\n\s*([^\n]+)\n\s*([^\n]+)/);
  if(resp){ set2("respName",resp[1]); set2("respPhone",resp[2]); set2("respEmail",resp[3].replace(/\s+/g,"")); set2("respDept",resp[4]); }
  const tb=clean.match(/อาจารย์ผู้สอน\s*\n([\s\S]*?)(?=\n\s*นักศึกษา\s*\n)/);
  if(tb){
    const lines=tb[1].split(/\n+/).map(x=>x.trim()).filter(Boolean);
    const teachers=[];
    for(let i=0;i<lines.length;i++){
      const nm=lines[i].match(/^(\d+)\.\s*(.+)$/);
      if(nm && nm[2]){
        const phone=lines[i+1]||""; const email=(lines[i+2]||"").replace(/\s+/g,""); const dept=lines[i+3]||"";
        if(nm[2].trim()) teachers.push({name:nm[2].trim(),phone,email,dept});
      }
    }
    if(teachers.length) S.d.teachers=teachers;
  }

  m=clean.match(/จุดมุ่งหมายของรายวิชา\s*\n([\s\S]*?)\n\s*วัตถุประสงค์ในการพัฒนา/); if(m) set2("aim",m[1].trim().replace(/\n/g," "));
  m=clean.match(/วัตถุประสงค์ในการพัฒนา\/ปรับปรุงรายวิชา\s*\n([\s\S]*?)\n\s*วัตถุประสงค์ของรายวิชา/); if(m) set2("devObj",m[1].trim().replace(/\n/g,"\n"));
  const cloBlock=clean.match(/เมื่อสิ้นสุดการเรียนการสอน นักศึกษาสามารถ\s*\n([\s\S]*?)\n\s*ความสอดคล้องระหว่างผลลัพธ์/);
  if(cloBlock){
    const clos=[...cloBlock[1].matchAll(/CLO\s*(\d+)\s+([\s\S]*?)(?=\n\s*CLO\s*\d+\s+|$)/g)]
      .sort((a,b)=>+a[1]-+b[1]).map(x=>({text:x[2].trim().replace(/\n/g," ")}));
    if(clos.length){ S.d.clos=clos; ensureCloAssess(); }
  }

  const desc=clean.match(/คำอธิบายรายวิชา\s*\n\s*ภาษาไทย\s*\n([\s\S]*?)\n\s*ภาษาอังกฤษ\s*\n([\s\S]*?)\n\s*จำนวนชั่วโมง/);
  if(desc){ set2("descTH",desc[1].trim().replace(/\n/g," ")); set2("descEN",desc[2].trim().replace(/\n/g," ")); }

  const sec5=clean.match(/2\. แผนการประเมินผลลัพธ์การเรียนรู้ของรายวิชา[\s\S]*?(?=3\. การตัดสินผล|หมวดที่ 6)/);
  if(sec5){
    m=sec5[0].match(/Formative Assessment\)\s*\n([\s\S]*?)\n\s*2\) การประเมินเพื่อตัดสินผลการเรียนรู้/); if(m) set2("formativeDesc",m[1].trim());
    m=sec5[0].match(/Summative Assessment\)\s*\n([\s\S]*?)\n\s*ผลลัพธ์การเรียนรู้ของรายวิชา/); if(m) set2("summativeDesc",m[1].trim());
  }

  const sec6=clean.match(/หมวดที่ 6[\s\S]*?ตำราและเอกสารหลัก\s*\n([\s\S]*?)\n\s*เอกสารและข้อมูลสำคัญ\s*\n([\s\S]*?)\n\s*เอกสารและข้อมูลแนะนำ[\s\S]*?\n([\s\S]*?)(?=หมวดที่ 7)/);
  if(sec6){
    const parseList=x=>{
      const mm=[...x.matchAll(/\n?\s*\d+\)\s*([\s\S]*?)(?=\n\s*\d+\)\s|$)/g)].map(v=>v[1].trim().replace(/\n/g," ")).filter(Boolean);
      return mm.length?mm:(x.trim()==="-"?["-"]:[]);
    };
    S.d.mainBooks=parseList("\n"+sec6[1]); S.d.suppBooks=parseList("\n"+sec6[2]); S.d.recBooks=parseList("\n"+sec6[3]);
  }

  const sec7=clean.match(/หมวดที่ 7[\s\S]*?1\. กลยุทธ์การประเมินประสิทธิผลของรายวิชาโดยนักศึกษา\s*\n([\s\S]*?)\n\s*2\. กลยุทธ์การประเมินการสอน\s*\n([\s\S]*?)\n\s*3\. การปรับปรุงการสอน\s*\n([\s\S]*?)\n\s*4\. การทวนสอบมาตรฐาน[\s\S]*?5\. การดำเนินการทบทวนและการวางแผนปรับปรุงประสิทธิผลของรายวิชา\s*\n([\s\S]*?)(?=ผู้จัดทำ|$)/);
  if(sec7){ set2("evalStrat",sec7[1].trim()); set2("teachEval",sec7[2].trim()); set2("improve",sec7[3].trim()); set2("reviewPlan",sec7[4].trim()); }

  parseTeachingRows(clean);
}
function parseTeachingRows(clean){
  const sec=clean.match(/1\. แผนการสอน[\s\S]*?ผู้สอน\s*\n([\s\S]*?)(?=หมายเหตุ|2\. แผนการประเมินผลลัพธ์|$)/);
  if(!sec) return;
  const txt=sec[1];
  const parts=txt.split(/\n(?=\d+\s*\n\(\d{2}-\d{2}-\d{2}\))/).map(x=>x.trim()).filter(Boolean);
  const rows=[];
  parts.forEach(part=>{
    const rm=part.match(/^(\d+)\s*\n\(([^)]+)\)\s*\n([\s\S]*)$/);
    if(!rm) return;
    let body=rm[3].trim();
    let teacher="";
    const teacherM=body.match(/(ดร\.|ผศ\.ดร\.|รศ\.ดร\.|ศ\.ดร\.)[^\n]+$/);
    if(teacherM){ teacher=teacherM[0].trim(); body=body.slice(0,teacherM.index).trim(); }
    const hm=body.match(/\n\s*(\d+(?:\.\d+)?)\s+/);
    let topic=body, activity="", hours="";
    if(hm){ hours=hm[1]; topic=body.slice(0,hm.index).trim(); activity=body.slice(hm.index+hm[0].length).trim(); }
    rows.push({topic,activity,teacher,hours});
  });
  if(rows.length){
    if(S.d.charType==="lab") S.d.labTopics=rows;
    else S.d.lectTopics=rows;
    S.d.numWeeks=rows.length;
  }
}

function buildTopicSection(title, sched, topics){
  const outer=mk("div");
  if(title){const h3=mk("h3"); h3.textContent="แผนการสอน — "+title; outer.appendChild(h3);}
  const wrap=mk("div"); wrap.style="overflow-x:auto; margin-top:8px";
  const tbl=mk("table"); tbl.className="stbl";
  tbl.innerHTML="<thead><tr><th style='width:160px'>ครั้งที่ / วันที่</th><th>หัวข้อ / เรื่อง</th><th>กิจกรรม / งานมอบหมาย</th><th style='width:110px'>ผู้สอน</th></tr></thead>";
  const tbody=mk("tbody");

  (sched||[]).forEach(row2=>{
    const tr=mk("tr");
    if(row2.type==="midterm"){
      const td=mk("td"); td.className="exam"; td.colSpan=4;
      td.textContent="สอบกลางภาค   "+
        (S.d.midtermDate?thaiDayFull(S.d.midtermDate):"..............")+
        "   เวลา "+thaiTime(S.d.midtermTimeS,S.d.midtermTimeE);
      tr.appendChild(td); tbody.appendChild(tr); return;
    }
    if(row2.type==="final"){
      const td=mk("td"); td.className="exam"; td.colSpan=4;
      td.textContent="สอบประจำภาค   "+
        (S.d.finalDate?thaiDayFull(S.d.finalDate):"..............")+
        "   เวลา "+thaiTime(S.d.finalTimeS,S.d.finalTimeE);
      tr.appendChild(td); tbody.appendChild(tr); return;
    }
    if(row2.type==="holiday"){
      const td=mk("td"); td.className="hol"; td.colSpan=4;
      td.textContent=row2.holDesc+" — "+thaiDateFull(row2.date);
      tr.appendChild(td); tbody.appendChild(tr); return;
    }
    // lecture row
    const sess=row2.sess;
    if(!topics[sess-1]) topics[sess-1]={topic:"",activity:"",teacher:""};
    const t=topics[sess-1];

    const td1=mk("td");
    td1.style="font-size:.8rem;line-height:1.4;white-space:nowrap;vertical-align:top;padding:7px 9px";
    const span1=mk("span"); span1.style="font-weight:700;display:block"; span1.textContent="ครั้งที่ "+sess;
    const span2=mk("span"); span2.style="color:#5a6b8a;font-size:.75rem"; span2.textContent="("+thaiDateFull(row2.date)+")";
    td1.appendChild(span1); td1.appendChild(span2);

    const iTop=mk("input"); iTop.placeholder="หัวข้อ..."; iTop.value=t.topic||""; iTop.oninput=()=>{topics[sess-1].topic=iTop.value;};
    const iAct=mk("input"); iAct.placeholder="กิจกรรม..."; iAct.value=t.activity||""; iAct.oninput=()=>{topics[sess-1].activity=iAct.value;};
    const iTch=mk("input"); iTch.placeholder="ผู้สอน"; iTch.value=t.teacher||""; iTch.oninput=()=>{topics[sess-1].teacher=iTch.value;};
    const td2=mk("td"); td2.appendChild(iTop);
    const td3=mk("td"); td3.appendChild(iAct);
    const td4=mk("td"); td4.appendChild(iTch);
    tr.append(td1,td2,td3,td4); tbody.appendChild(tr);
  });

  tbl.appendChild(tbody); wrap.appendChild(tbl);
  if(typeof outer!=="undefined"){ outer.appendChild(wrap); return outer; }
  return wrap;
}

async function waitDocx(){
  if(window.docx) return window.docx;
  if(window._docxFail) throw new Error("ไม่สามารถโหลด docx.js ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
  /* Poll until loaded or timeout 20s */
  return new Promise((res,rej)=>{
    const t0=Date.now();
    const chk=()=>{
      if(window.docx){res(window.docx);return;}
      if(window._docxFail){rej(new Error("โหลด docx.js ไม่สำเร็จ"));return;}
      if(Date.now()-t0>20000){
        if(window.docx){res(window.docx);return;}
        rej(new Error("หมดเวลา 20 วินาที — กรุณาตรวจสอบอินเทอร์เน็ตและรีโหลดหน้า"));return;
      }
      setTimeout(chk,250);
    };
    chk();
  });
}

function mkCell(content, opts){
  const {TableCell,Paragraph,TextRun,AlignmentType,WidthType,VerticalAlign,BorderStyle,ShadingType}=getD();
  const b1={style:BorderStyle.SINGLE,size:1,color:"888888"};
  const bd={top:b1,bottom:b1,left:b1,right:b1};
  const al = (opts&&opts.center)?AlignmentType.CENTER:AlignmentType.LEFT;
  const sz = (opts&&opts.sz)?opts.sz*2:FS;
  const paras = Array.isArray(content) ?
    content :
    [new Paragraph({alignment:al,spacing:{before:0,after:0},children:[new TextRun({text:String(content||""),bold:!!(opts&&opts.bold),size:sz,font:{name:FONT}})]})];
  return new TableCell({
    borders:bd,
    columnSpan:(opts&&opts.span)||1,
    rowSpan:(opts&&opts.rowSpan)||undefined,
    width:{size:(opts&&opts.w)||1000,type:WidthType.DXA},
    verticalAlign:VerticalAlign.CENTER,
    shading:(opts&&opts.bg)?{fill:opts.bg,type:ShadingType.CLEAR}:undefined,
    margins:{top:60,bottom:60,left:100,right:100},
    children:paras
  });
}

function mkTbl(rows,colWidths,totalW){

function mkP(texts,opts){
  const {Paragraph,TextRun,AlignmentType}=getD();
  const al=(opts&&opts.center)?AlignmentType.CENTER:(opts&&opts.right)?AlignmentType.RIGHT:AlignmentType.LEFT;
  const sp={before:(opts&&opts.sb||0)*20,after:(opts&&opts.sa||0)*20};
  const runs=Array.isArray(texts)?texts:[{t:String(texts||""),bold:!!(opts&&opts.bold),sz:(opts&&opts.sz)||null,color:"000000"}];
  return new Paragraph({
    alignment:al, spacing:sp,
    children:runs.map(r=>new TextRun({
      text:r.t, bold:!!r.bold,
      size:r.sz?r.sz*2:FS,
      font:{name:FONT},
      color:r.color||"000000"
    }))
  });
}

function buildAssessTable(totalW){
  const {TableRow}=getD();
  // Columns: CLO | วิธีการประเมิน | น้ำหนักแต่ละวิธี | น้ำหนักรวมต่อ CLO
  const w0=Math.floor(totalW*.36),w1=Math.floor(totalW*.40),w2=Math.floor(totalW*.12),w3=Math.floor(totalW*.12);
  const hdr=new TableRow({children:[
    hCell("ผลลัพธ์การเรียนรู้ของรายวิชา (CLOs)",{w:w0}),
    hCell("วิธีการวัดและประเมินผล",{w:w1}),
    hCell("น้ำหนักคะแนน",{w:w2}),
    hCell("น้ำหนักรวมต่อ CLO",{w:w3})
  ]});
  const rows=[hdr];
  S.d.clos.forEach((clo,ci)=>{
    const methods=(S.d.cloAssess[ci]||[{method:"",weight:""}]);
    const total=methods.reduce((a,m)=>a+(parseInt(m.weight)||0),0);
    methods.forEach((m,mi)=>{
      const tr=new TableRow({children:[
        ...(mi===0?[mkCell("CLO "+(ci+1)+": "+(clo.text||""),{sz:9,w:w0,rowSpan:methods.length>1?methods.length:undefined})]:[]),
        mkCell(m.method||"",{sz:10,w:w1}),
        mkCell(String(m.weight||""),{center:true,sz:10,w:w2}),
        ...(mi===0?[mkCell(String(total),{center:true,bold:true,sz:10,w:w3,rowSpan:methods.length>1?methods.length:undefined})]:[])
      ]});
      rows.push(tr);
    });
  });
  const totalAll=cloWeightTotal();
  rows.push(new TableRow({children:[
    hCell("รวม",{w:w0+w1}),
    hCell(String(totalAll)+"%",{w:w2+w3})
  ]}));
  return mkTbl(rows,[w0,w1,w2,w3],totalW);
}

function safeText(v, fallback="............."){
  const s = (v===undefined || v===null) ? "" : String(v).trim();
  return s ? s : fallback;
}
function safeBlank(v){ return (v===undefined||v===null) ? "" : String(v).trim(); }
function listText(arr, numbered=true, fallback="-"){
  const vals=(arr||[]).map(x=>String(x||"").trim()).filter(Boolean);
  if(!vals.length) return fallback;
  return vals.map((x,i)=> numbered ? `${i+1}) ${x}` : `- ${x}`).join("\n");
}
function checkboxText(selected, label){ return (selected ? CHECK : UNCHECK)+" "+label; }

}

async function renderDocxTemplate(templateB64, data){
  if(!window.PizZip || !window.docxtemplater){
    throw new Error("ไม่พบไลบรารี PizZip/docxtemplater กรุณาตรวจสอบอินเทอร์เน็ต หรือรอให้หน้าเว็บโหลดครบ");
  }
  const zip = new PizZip(base64ToArrayBuffer(templateB64));
  const doc = new window.docxtemplater(zip, { paragraphLoop:true, linebreaks:true, nullGetter:()=>"" });
  doc.render(data);
  return doc.getZip().generate({type:"blob", mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
}
window.genDoc = async function(type){
  const st=document.getElementById("genStatus");
  if(st) showSt(st,"กำลังสร้างไฟล์ Word จาก template ต้นฉบับ...","info");
  try{
    const data=await buildTemplateData(type);
    const tmpl = (type==="spec" && S.importedSpecB64 && false) ? S.importedSpecB64 : (type==="syll" ? TEMPLATE_SYLL_B64 : TEMPLATE_SPEC_B64);
    const blob=await renderDocxTemplate(tmpl, data);
    const d=S.d;
    const filename = type==="syll" ? `FM-SCE-002_${safeText(d.code,"Course")}_CourseSyllabus.docx` : `FM-SCE-003_${safeText(d.code,"Course")}_CourseSpecification.docx`;
    saveAs(blob, filename.replace(/[\\/:*?"<>|]/g,"_"));
    if(st) showSt(st,"สร้างไฟล์สำเร็จด้วยระบบ template-based", "ok");
  }catch(e){
    console.error(e);
    if(st) showSt(st,"เกิดข้อผิดพลาด: "+(e.message||e),"err");
    else alert("เกิดข้อผิดพลาด: "+(e.message||e));
  }
};
